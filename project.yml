name: Fleet
options:
  bundleIdPrefix: dev.fuwasegu
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: ja   # 基準言語=日本語(日本語文字列をそのままローカライズキーに)
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGNING_ALLOWED: "NO"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
targets:
  KanbanKit:
    type: framework
    platform: macOS
    sources:
      - Sources/KanbanKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fuwasegu.KanbanKit
        GENERATE_INFOPLIST_FILE: "YES"
        DEFINES_MODULE: "YES"
  fleet-bridge:
    type: tool
    platform: macOS
    sources:
      - Sources/fleet-bridge
    settings:
      base:
        PRODUCT_NAME: fleet-bridge
        CODE_SIGNING_ALLOWED: "NO"
  Fleet:
    type: application
    platform: macOS
    sources:
      - Sources/KanbanTerm
      - path: Resources/markdown
        buildPhase: resources
      - Resources/Assets.xcassets
    dependencies:
      - target: KanbanKit
        embed: true
      - package: SwiftTerm
      - target: fleet-bridge
        copy:
          destination: executables   # Contents/MacOS/fleet-bridge に同梱
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fuwasegu.Fleet
        PRODUCT_NAME: Fleet
        MARKETING_VERSION: "0.4.3"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Fleet
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
  KanbanKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/KanbanKitTests
    dependencies:
      - target: KanbanKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fuwasegu.KanbanKitTests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Fleet:
    build:
      targets:
        Fleet: all
        KanbanKitTests: [test]
    run:
      # 会社管理PCで出る "Developer Tools Access" 認証を回避するため、
      # Run時にデバッガをアタッチしない(ブレークポイントは使えなくなる)。
      # デバッグしたくなったら Xcode の Edit Scheme > Run > Info > Debug executable を一時ONに。
      debugEnabled: false
    test:
      targets:
        - KanbanKitTests
